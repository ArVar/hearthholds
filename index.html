<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Hearthholds: Living Places – local map editor for tabletop role-playing settlements"
    />
    <meta name="application-name" content="Hearthholds" />
    <meta name="theme-color" content="#1a1d1d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="/assets/branding/hearthholds-favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/branding/hearthholds-icon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/branding/hearthholds-icon-16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/branding/hearthholds-icon-180.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/assets/branding/hearthholds-icon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/assets/branding/hearthholds-icon-512.png"
    />
    <script>
      try {
        const storedPreference = localStorage.getItem("pnp-settlement.theme");
        const preference = storedPreference === "light" || storedPreference === "dark"
          ? storedPreference
          : "system";
        const theme = preference === "system"
          ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : preference;
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch {}
    </script>
    <title>Hearthholds: Living Places</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
